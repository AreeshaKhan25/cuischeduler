version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cuischeduler
      POSTGRES_USER: cui
      POSTGRES_PASSWORD: cuisecure2025
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cui -d cuischeduler"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://cui:cuisecure2025@postgres:5432/cuischeduler
      SECRET_KEY: cuischeduler_jwt_secret_key_2025_os_project
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres: { condition: service_healthy }
    command: >
      sh -c "alembic upgrade head &&
             python seed/seed_data.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes: ["./backend:/app"]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on: [backend]
    volumes: ["./frontend:/app", "frontend_node_modules:/app/node_modules"]
    command: npm run dev

volumes:
  postgres_data:
  frontend_node_modules:
